<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thijs Porck - Publications</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            margin: 0; 
            padding: 20px; 
            background: #f9f9f9; 
        }
        .container { 
            max-width: 1400px; 
            margin: 0 auto; 
            display: flex; 
            gap: 25px;
        }
        .main-content { 
            flex: 7; 
        }
        .sidebar { 
            flex: 3; 
            min-width: 320px;
        }
        .sidebar .chart-container {
            background: white; 
            padding: 20px; 
            border-radius: 8px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        h1 { text-align: center; margin-bottom: 10px; }
        .controls {
            background: white; 
            padding: 18px; 
            border-radius: 8px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
        }

        /* Clean publication list */
        .publications-list {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .pub-item {
            padding: 14px 20px;
            border-bottom: 1px solid #eee;
            line-height: 1.45;
        }
        .pub-item:last-child { border-bottom: none; }
        .pub-item:hover { background: #f8f9fa; }
        .pub-type { 
            font-size: 0.85rem; 
            color: #555; 
            font-weight: 500;
        }
        .pub-title { 
            font-size: 1.1rem; 
            margin: 6px 0 4px 0;
        }
        .pub-title.monograph { font-style: italic; }
        .pub-authors { 
            color: #444; 
            font-size: 0.95rem;
        }
        .pub-meta {
            font-size: 0.9rem;
            color: #666;
            margin-top: 4px;
        }
        .doi-link {
            color: #0066cc;
            text-decoration: none;
            font-weight: 500;
        }
        .doi-link:hover { text-decoration: underline; }

        .pub-count { 
            font-weight: bold; 
            margin: 10px 0 15px 0; 
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- LEFT: Publications List -->
        <div class="main-content">
            <h1>Publications</h1>
            <div class="pub-count">Showing <span id="countNum">0</span> publications</div>
            
            <div class="publications-list" id="pubList"></div>
        </div>

        <!-- RIGHT: Sidebar -->
        <div class="sidebar">
            <div class="controls">
                <div>
                    <label><strong>Open Access</strong></label><br>
                    <select id="oaFilter">
                        <option value="">All</option>
                        <option value="Yes">Yes</option>
                        <option value="No">No</option>
                    </select>
                </div>
                <div>
                    <label><strong>Publisher</strong></label><br>
                    <select id="publisherFilter"></select>
                </div>
                <div>
                    <label><strong>Theme</strong></label><br>
                    <select id="themeFilter"></select>
                </div>
                <div>
                    <label><strong>Co-author</strong></label><br>
                    <select id="coauthorFilter"></select>
                </div>
                <div>
                    <label><input type="checkbox" id="reviewedFilter"> Reviewed only</label>
                </div>
            </div>

            <div class="chart-container">
                <h2>Publication Types</h2>
                <canvas id="typePieChart" height="260"></canvas>
            </div>

            <div class="chart-container">
                <h2>Publications per Year</h2>
                <canvas id="yearBarChart" height="140"></canvas>
            </div>
        </div>
    </div>

<script>
// ==================== CONFIG ====================
const CSV_URL = 'https://raw.githubusercontent.com/thijsporck/thijsporck-html/refs/heads/main/data/publications.csv'; 
// ← Update this if your CSV is in a different location

let allPublications = [];
let typeChart, yearChart;

// ==================== LOAD CSV ====================
Papa.parse(CSV_URL, {
    download: true,
    header: true,
    skipEmptyLines: true,
    complete: function(results) {
        allPublications = results.data.filter(row => row.Title && row.Year);
        populateFilters();
        renderAll();
    },
    error: function(err) {
        console.error(err);
        document.getElementById('pubList').innerHTML = `<p style="color:red;padding:20px;">Failed to load CSV. Check the URL.</p>`;
    }
});

// ==================== FILTERS & RENDER ====================
function populateFilters() { /* same as before */ 
    // ... (I'll keep it short - same code as previous version)
    const pubs = allPublications;
    
    const publishers = [...new Set(pubs.map(p => p.Publisher).filter(Boolean))].sort();
    const pubSelect = document.getElementById('publisherFilter');
    pubSelect.innerHTML = '<option value="">All</option>';
    publishers.forEach(p => { const opt = document.createElement('option'); opt.value = p; opt.textContent = p; pubSelect.appendChild(opt); });

    const allThemes = new Set();
    pubs.forEach(p => {
        if (p['Theme(s)']) p['Theme(s)'].split(';').map(t => t.trim()).filter(Boolean).forEach(t => allThemes.add(t));
    });
    const themeSelect = document.getElementById('themeFilter');
    themeSelect.innerHTML = '<option value="">All</option>';
    [...allThemes].sort().forEach(t => { const opt = document.createElement('option'); opt.value = t; opt.textContent = t; themeSelect.appendChild(opt); });

    const coauthors = new Set();
    pubs.forEach(p => {
        if (p['Author(s)']) p['Author(s)'].split(';').map(a => a.trim()).filter(a => a && !a.includes('Thijs Porck')).forEach(a => coauthors.add(a));
    });
    const coSelect = document.getElementById('coauthorFilter');
    coSelect.innerHTML = '<option value="">All</option>';
    [...coauthors].sort().forEach(c => { const opt = document.createElement('option'); opt.value = c; opt.textContent = c; coSelect.appendChild(opt); });

    ['oaFilter','publisherFilter','themeFilter','coauthorFilter','reviewedFilter'].forEach(id => {
        document.getElementById(id).addEventListener('change', renderAll);
    });
}

function filterPublications() {
    let filtered = [...allPublications];
    const oa = document.getElementById('oaFilter').value;
    if (oa) filtered = filtered.filter(p => (p['Open Access'] || '').trim() === oa);
    
    const pub = document.getElementById('publisherFilter').value;
    if (pub) filtered = filtered.filter(p => p.Publisher === pub);
    
    const theme = document.getElementById('themeFilter').value;
    if (theme) filtered = filtered.filter(p => p['Theme(s)'] && p['Theme(s)'].includes(theme));
    
    const co = document.getElementById('coauthorFilter').value;
    if (co) filtered = filtered.filter(p => p['Author(s)'] && p['Author(s)'].includes(co));
    
    if (document.getElementById('reviewedFilter').checked) {
        filtered = filtered.filter(p => (p.Reviewed || '').toLowerCase() === 'yes');
    }
    return filtered;
}

function renderAll() {
    const filtered = filterPublications();
    document.getElementById('countNum').textContent = filtered.length;
    renderPublicationsList(filtered);
    renderTypePie(filtered);
    renderYearBar(filtered);
}

// ==================== CLEAN LIST RENDERING ====================
function renderPublicationsList(pubs) {
    const container = document.getElementById('pubList');
    container.innerHTML = '';
    
    pubs.sort((a, b) => parseInt(b.Year) - parseInt(a.Year));
    
    pubs.forEach(pub => {
        const isMonograph = ['monograph', 'edited volume', 'book'].some(t => 
            (pub['Type of publication'] || '').toLowerCase().includes(t)
        );
        
        let doiHtml = '';
        const isOA = (pub['Open Access'] || '').trim() === 'Yes';
        if (pub.DOI) {
            const doiLink = pub.DOI.startsWith('http') ? pub.DOI : `https://doi.org/${pub.DOI}`;
            const linkText = isOA ? "Link to Open Access publication" : "Link to publication";
            doiHtml = `<a href="${doiLink}" target="_blank" class="doi-link">[${linkText}]</a>`;
        }
        
        const div = document.createElement('div');
        div.className = 'pub-item';
        div.innerHTML = `
            <div class="pub-type">${pub['Type of publication'] || ''} — ${pub.Year || ''}</div>
            <div class="pub-title ${isMonograph ? 'monograph' : ''}">${pub.Title || ''}</div>
            <div class="pub-authors">${pub['Author(s)'] || ''}</div>
            <div class="pub-meta">
                ${pub.Journal || pub['Book series'] || pub.Publisher || ''} 
                ${pub['Page-range'] ? `• ${pub['Page-range']}` : ''}
                ${doiHtml ? ' • ' + doiHtml : ''}
            </div>
        `;
        container.appendChild(div);
    });
}

// ==================== CHARTS ====================
function renderTypePie(pubs) { /* same as before */ 
    const ctx = document.getElementById('typePieChart');
    const counts = {};
    pubs.forEach(p => {
        const t = p['Type of publication'] || 'Other';
        counts[t] = (counts[t] || 0) + 1;
    });
    if (typeChart) typeChart.destroy();
    typeChart = new Chart(ctx, {
        type: 'pie',
        data: { labels: Object.keys(counts), datasets: [{ data: Object.values(counts), backgroundColor: ['#4e79a7','#f28e2c','#e15759','#76b7b2','#59a14f','#edc949'] }] },
        options: { responsive: true, plugins: { legend: { position: 'bottom' } }}
    });
}

function renderYearBar(pubs) { /* same as before */ 
    const ctx = document.getElementById('yearBarChart');
    const counts = {};
    pubs.forEach(p => { if (p.Year) counts[p.Year] = (counts[p.Year] || 0) + 1; });
    const years = Object.keys(counts).sort((a,b)=>a-b);
    if (yearChart) yearChart.destroy();
    yearChart = new Chart(ctx, {
        type: 'bar',
        data: { labels: years, datasets: [{ label: 'Publications', data: years.map(y => counts[y]), backgroundColor: '#4e79a7' }] },
        options: { responsive: true, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 }} }}
    });
}
</script>
</body>
</html>
