<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thijs Porck - Publications</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        /* Page-specific styles that complement css/style.css */
         body { margin: 0; padding: 20px;}
        .container { max-width: 1400px; margin: 0 auto; display: flex; gap: 10px; }
        .main-content { flex: 7; }
        .sidebar { flex: 3; min-width: 300px; }

        .sidebar .box { padding: 10px; border-radius: 4px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); margin-bottom: 10px; }

        /* Accordion */
        .accordion { margin-bottom: 10px; }
        .accordion-header { cursor: pointer; font-weight: 600; padding: 10px 0; display: flex; justify-content: space-between; align-items: center; }
        .accordion-header::after { content: "▼"; font-size: 0.9rem; transition: transform 0.2s; }
        .accordion-header.active::after { transform: rotate(180deg); }
        .accordion-content { display: none; padding: 8px 0; max-height: 320px; overflow-y: auto; }
        .accordion-content.active { display: block; }

        .checkbox-label { display: block; padding: 4px 0; font-size: 0.95rem; }

        /* Publication list small tweaks */
        .publications-list { border-radius: 4px; overflow: hidden; }
        .pub-item { padding: 8px 11px; border-bottom: 1px solid; line-height: 1.25; }
        .pub-item:last-child { border-bottom: none; }
        .pub-item:hover { background: #F2F2F2; }
        .pub-title { font-style: italic; }
        .doi-link { color: #0c2577; text-decoration: none; font-weight: 500; }
        .doi-link:hover { color: #9B2C2C; text-decoration: underline; }
        .pub-count { font-weight: bold; margin: 5px 0 10px 0; font-size: 1.1rem; }

        /* Legend styles - more compact */
        .type-legend { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; font-size: 0.9rem; }
        .type-legend-item { display: inline-flex; align-items: center; gap: 4px; cursor: pointer; }
        .type-legend-item input[type="checkbox"] { margin: 0; }
        .color-box { width: 12px; height: 12px; border-radius: 2px; display: inline-block; flex-shrink: 0; }
        .type-legend-item span:last-child { white-space: nowrap; }

        /* Year bar pointer */
        #yearBarChart { cursor: pointer }

        /* Small responsive adjustments (the main responsive layout is in css/style.css) */
        @media (max-width: 900px) {
            .type-legend { gap: 6px }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- LEFT: Publications -->
        <div class="main-content">
            <h1>Publications</h1>
            <div class="pub-count">Showing <span id="countNum">0</span> publications</div>
            <div class="publications-list" id="pubList"></div>
        </div>

        <!-- RIGHT: Sidebar -->
        <div class="sidebar">
            <div class="box">
                <label><input type="checkbox" id="oaFilter"> <strong>Only show Open Access publications</strong></label>
            </div>

            <div class="box">
                <h2>Publication Types</h2>
                <canvas id="typePieChart" height="260"></canvas>
                <div id="typeLegend" class="type-legend" aria-hidden="false"></div>
            </div>

            <div class="box">
                <h2>Publications per Year</h2>
                <canvas id="yearBarChart" height="160"></canvas>
            </div>

            <div class="box">
                <div class="accordion">
                    <div class="accordion-header" data-target="themeContent">Themes <span id="themeCount"></span></div>
                    <div class="accordion-content" id="themeContent"></div>
                </div>
                <div class="accordion">
                    <div class="accordion-header" data-target="coauthorContent">Co-authors <span id="coauthorCount"></span></div>
                    <div class="accordion-content" id="coauthorContent"></div>
                </div>
                <div class="accordion">
                    <div class="accordion-header" data-target="publisherContent">Publishers <span id="publisherCount"></span></div>
                    <div class="accordion-content" id="publisherContent"></div>
                </div>
            </div>
        </div>
    </div>

<script>
// ==================== CONFIG ====================
const CSV_URL = 'https://raw.githubusercontent.com/thijsporck/thijsporck-html/refs/heads/main/data/publications.csv';

let allPublications = [];
let allTypes = [];
let typeChart, yearChart;
let activeFilters = { themes: new Set(), coauthors: new Set(), publishers: new Set(), typesExcluded: new Set(), years: new Set() };

// ==================== LOAD CSV ====================
Papa.parse(CSV_URL, {
    download: true,
    header: true,
    skipEmptyLines: true,
    complete: function(results) {
        allPublications = results.data.filter(row => row.Title && row.Year);
        // Build master list of types in order of first appearance in CSV
        allTypes = [];
        const seen = new Set();
        allPublications.forEach(p => {
            const t = (p['Type of publication']||'Other').trim();
            if (!seen.has(t)) {
                allTypes.push(t);
                seen.add(t);
            }
        });
        populateFilters(allPublications); // initial population
        renderAll();
    }
});

// ==================== Fixing author and editor formatting ====================
function formatAuthors(authorsStr, isEditor = false) {
    if (!authorsStr) return '';
    let authors = authorsStr.split(';').map(a => a.trim()).filter(Boolean);
    if (authors.length === 0) return '';
    
    let formatted = authors.slice(0, -1).join(', ');
    if (authors.length > 1) formatted += ' & ' + authors[authors.length - 1];
    else formatted = authors[0];
    
    if (isEditor) formatted += authors.length > 1 ? ' (eds.)' : ' (ed.)';
    return formatted;
}

// ==================== MAIN RENDER ====================
function renderPublicationsList(pubs) {
    const container = document.getElementById('pubList');
    container.innerHTML = '';

    pubs.forEach(pub => {
        const type = (pub['Type of publication'] || '').trim();
        let html = '';
        const isOA = (pub['Open Access'] || '').trim() === 'Yes';
        const doiHtml = pub.DOI ? 
            `<a href="${pub.DOI.startsWith('http') ? pub.DOI : 'https://doi.org/' + pub.DOI}" target="_blank" class="doi-link">` +
            `[Link to ${isOA ? 'Open Access ' : ''}publication]</a>` : '';

        const authors = formatAuthors(pub['Author(s)'], 
            ['Edited volume', 'Peer-reviewed online text edition'].includes(type));

        const typesWithItalicTitle = ['Monograph', 'Edited volume', 'Peer-reviewed online text edition', 'Dataset'];
        const title = typesWithItalicTitle.includes(type) ? 
            `<span class="pub-title">${pub.Title}</span>` :
            `${pub.Title}`;

        if (type === 'Monograph') {
            html = `${authors}, <i>${title}</i>, ${pub['Book series'] || ''} ${pub.Volume || ''} (${pub.Location || ''}: ${pub.Publisher}, ${pub.Year}) ${doiHtml} - ${pub.Reviewed}`;
        }

        else if (['Edited volume', 'Peer-reviewed online text edition', 'Dataset'].includes(type)) {
         // 1. Only add a comma and space after authors if authors exist
            const authorPart = authors ? `${authors}, ` : '';
         // 2. Title already has italic handling from above
            const titlePart = title ? `<i>${title}</i>` : '';
         // 3. Only add a comma and space before series if it exists
            const seriesPart = pub['Book series'] ? `, ${pub['Book series']}` : '';
         // 4. Only add volume with a space if it exists
            const volumePart = pub.Volume ? ` ${pub.Volume}` : '';
         // 5. Build the inside of the parentheses dynamically so colons/commas don't break
            let metaInfo = [];
                if (pub.Location && pub.Publisher) {
                metaInfo.push(`${pub.Location}: ${pub.Publisher}`);
                    } else if (pub.Location || pub.Publisher) {
                metaInfo.push(pub.Location || pub.Publisher); // Fallback if only one exists
                    }
                if (pub.Year) metaInfo.push(pub.Year);
                // Wrap metaInfo in parentheses only if we actually found a location, publisher, or year
            const metaPart = metaInfo.length > 0 ? ` (${metaInfo.join(', ')})` : '';
         // 6. No comma before DOI for these types
            const doiPart = doiHtml ? ` ${doiHtml}` : '';

         // 7. Only add the review dash if reviewed is true
            const reviewPart = pub.Reviewed ? ' — Reviewed' : '';

            // Assemble html for edited-volume-like types and close the block
            const htmlBody = `${authorPart}${titlePart}${seriesPart}${volumePart}${metaPart}${doiPart}${reviewPart}`;
            html = htmlBody;
        }

        else if (type === 'Peer-reviewed journal article') {
         // 1. Build the core citation array (Authors, Title, Journal)
            let coreParts = [];
                if (authors) coreParts.push(authors);
                if (title) coreParts.push(`'${title}'`);
                if (pub.Journal) coreParts.push(`<span class="pub-title"><i>${pub.Journal}</i></span>`);
             // Join the core parts with a comma and a space
            let htmlStart = coreParts.join(', ');
         // 2. Handle Volume and Year combination gracefully
            let volumeYearPart = '';
                if (pub.Volume && pub.Year) {
                    volumeYearPart = ` ${pub.Volume} (${pub.Year})`;
                } else if (pub.Volume) {
                volumeYearPart = ` ${pub.Volume}`;
                } else if (pub.Year) {
                volumeYearPart = ` (${pub.Year})`;
                }
         // 3. Handle Page Range with its leading colon
            let pagePart = pub['Page-range'] ? `: ${pub['Page-range']}` : '';

            // 4. Handle DOI with its leading space/comma
            // (Assumes doiHtml already contains its own formatting or text link)
             let doiPart = doiHtml ? ` ${doiHtml}` : '';

            // Assemble everything tightly together
            html = `${htmlStart}${volumeYearPart}${pagePart}${doiPart}`;
        }

        else {
    // Check if 'Inside' is filled or empty
    if (!pub.Inside) {
        // --- 1. ACTS LIKE PEER-REVIEWED JOURNAL ARTICLE (Inside is empty) ---
        let coreParts = [];
        if (authors) coreParts.push(authors);
        if (title) coreParts.push(`'${title}'`);
        if (pub.Journal) coreParts.push(`<span class="pub-title">${pub.Journal}</span>`);
        
        let htmlStart = coreParts.join(', ');

        let volumeYearPart = '';
        if (pub.Volume && pub.Year) {
            volumeYearPart = ` ${pub.Volume} (${pub.Year})`;
        } else if (pub.Volume) {
            volumeYearPart = ` ${pub.Volume}`;
        } else if (pub.Year) {
            volumeYearPart = ` (${pub.Year})`;
        }

        let pagePart = pub['Page-range'] ? `: ${pub['Page-range']}` : '';
        let doiPart = doiHtml ? ` ${doiHtml}` : '';

        html = `${htmlStart}${volumeYearPart}${pagePart}${doiPart}`;

    } else {
        // --- 2. SPECIAL BOOK CHAPTER FORMAT (Inside is filled) ---
        let coreParts = [];
        if (authors) coreParts.push(authors);
        if (title) coreParts.push(`'${title}'`); // Kept single quotes here too for consistency
        
        // Use 'Inside' since we know it exists
        coreParts.push(`in: <span class="pub-title">${pub.Inside}</span>`);
        
        let htmlStart = coreParts.join(', ');
        let volumePart = pub.Volume ? ` ${pub.Volume}` : '';

        // Clean parenthetical info block (handles missing location or publisher)
        let metaInfo = [];
        if (pub.Location && pub.Publisher) {
            metaInfo.push(`${pub.Location}: ${pub.Publisher}`);
        } else if (pub.Location || pub.Publisher) {
            metaInfo.push(pub.Location || pub.Publisher);
        }
        if (pub.Year) metaInfo.push(pub.Year);
        
        let metaPart = metaInfo.length > 0 ? ` (${metaInfo.join(', ')})` : '';
        let pagePart = pub['Page-range'] ? `: ${pub['Page-range']}` : '';
        let doiPart = doiHtml ? ` ${doiHtml}` : '';

        html = `${htmlStart}${volumePart}${metaPart}${pagePart}${doiPart}`;
    }
}

        const div = document.createElement('div');
        div.className = 'pub-item';
        div.innerHTML = html.trim();
        container.appendChild(div);
    });
}

// ==================== FILTERS ====================
function populateFilters(pubs) {
    // If no specific set is provided, use full list
    pubs = pubs || allPublications;

    // Themes
    const themes = {};
    pubs.forEach(p => {
        if (p['Theme(s)']) p['Theme(s)'].split(';').map(t => t.trim()).filter(Boolean).forEach(t => themes[t] = (themes[t]||0)+1);
    });
    createCheckboxGroup('themeContent', themes, 'themes');

    // Co-authors
    const coauthors = {};
    pubs.forEach(p => {
        if (p['Author(s)']) p['Author(s)'].split(';').map(a => a.trim()).filter(a => a && !a.includes('Thijs Porck')).forEach(a => coauthors[a] = (coauthors[a]||0)+1);
    });
    createCheckboxGroup('coauthorContent', coauthors, 'coauthors');

    // Publishers
    const publishers = {};
    pubs.forEach(p => { if (p.Publisher) publishers[p.Publisher] = (publishers[p.Publisher]||0)+1; });
    createCheckboxGroup('publisherContent', publishers, 'publishers');

    // Accordion - attach listeners only once on initial load
    if (!window.accordionListenersAttached) {
        document.querySelectorAll('.accordion-header').forEach(header => {
            header.addEventListener('click', function(e) {
                e.preventDefault();
                const content = document.getElementById(this.dataset.target);
                content.classList.toggle('active');
                this.classList.toggle('active');
            });
        });
        window.accordionListenersAttached = true;
    }

    document.getElementById('oaFilter').addEventListener('change', () => { renderAll(); });
}

function createCheckboxGroup(containerId, data, filterType) {
    const container = document.getElementById(containerId);
    container.innerHTML = '';
    const sorted = Object.entries(data).sort((a,b) => b[1] - a[1]);
    sorted.forEach(([key, count]) => {
        const label = document.createElement('label');
        label.className = 'checkbox-label';
        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.value = key;
        checkbox.dataset.type = filterType;
        // For these sidebar filters the presence of a check means the filter is active (include only)
        checkbox.checked = activeFilters[filterType] && activeFilters[filterType].has(key);
        checkbox.addEventListener('change', e => {
            if (!activeFilters[filterType]) activeFilters[filterType] = new Set();
            if (e.target.checked) activeFilters[filterType].add(key);
            else activeFilters[filterType].delete(key);
            renderAll();
        });
        label.appendChild(checkbox);
        label.appendChild(document.createTextNode(' ' + key + ' '));
        const small = document.createElement('span'); small.style.color='#666'; small.textContent = `(${count})`;
        label.appendChild(small);
        container.appendChild(label);
    });
}

function filterPublications() {
    let filtered = [...allPublications];

    if (document.getElementById('oaFilter').checked) {
        filtered = filtered.filter(p => (p['Open Access'] || '').trim() === 'Yes');
    }
    // Exclude types that were unchecked in the legend
    if (activeFilters.typesExcluded.size > 0) {
        filtered = filtered.filter(p => !activeFilters.typesExcluded.has((p['Type of publication']||'Other').trim()));
    }
    // Year filter: when a year is selected, only show that year's publications
    if (activeFilters.years.size > 0) {
        filtered = filtered.filter(p => activeFilters.years.has(p.Year));
    }
    // Sidebar filters (themes/coauthors/publishers) act as includes: when any are checked, require match
    if (activeFilters.themes && activeFilters.themes.size > 0) {
        filtered = filtered.filter(p => p['Theme(s)'] && Array.from(activeFilters.themes).some(t => p['Theme(s)'].includes(t)));
    }
    if (activeFilters.coauthors && activeFilters.coauthors.size > 0) {
        filtered = filtered.filter(p => p['Author(s)'] && Array.from(activeFilters.coauthors).some(a => p['Author(s)'].includes(a)));
    }
    if (activeFilters.publishers && activeFilters.publishers.size > 0) {
        filtered = filtered.filter(p => activeFilters.publishers.has(p.Publisher));
    }
    return filtered;
}

function renderAll() {
    // Compute filtered pubs according to current filters
    const filtered = filterPublications();
    // Update counts and sidebar choices to reflect the narrowed dataset (so they adapt to type/year selections)
    populateFilters(filtered);
    document.getElementById('countNum').textContent = filtered.length;
    renderPublicationsList(filtered);
    renderTypePie(filtered);
    renderYearBar(filtered);
}

// ==================== CHARTS ====================
function renderTypePie(pubs) {
    const ctx = document.getElementById('typePieChart');
    const counts = {};
    pubs.forEach(p => { const t = (p['Type of publication']||'Other').trim(); counts[t] = (counts[t]||0)+1; });

    const palette = ['#4e79a7','#f28e2c','#e15759','#76b7b2','#59a14f','#edc949','#af7aa1','#9c755f','#bab0ac'];
    const labels = allTypes.slice(); // use master list in CSV order so legend items persist
    const dataValues = labels.map(l => counts[l] || 0);
    const colors = labels.map((_,i) => palette[i % palette.length]);

    if (typeChart) typeChart.destroy();
    typeChart = new Chart(ctx, {
        type: 'pie',
        data: { labels: labels.map((l,i)=>`${l} (${dataValues[i]})`), datasets: [{ data: dataValues, backgroundColor: colors }] },
        options: { responsive: true, plugins: { legend: { display: false } } }
    });

    // Build a custom legend with checkboxes (checkbox = included, unchecked = excluded)
    const legendDiv = document.getElementById('typeLegend');
    legendDiv.innerHTML = '';
    labels.forEach((label, idx) => {
        const item = document.createElement('label');
        item.className = 'type-legend-item';
        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        // checked = included
        checkbox.checked = !activeFilters.typesExcluded.has(label);
        checkbox.dataset.type = label;
        checkbox.addEventListener('change', (e) => {
            const t = e.target.dataset.type;
            if (e.target.checked) activeFilters.typesExcluded.delete(t);
            else activeFilters.typesExcluded.add(t);
            renderAll();
        });
        const colorBox = document.createElement('span');
        colorBox.className = 'color-box';
        colorBox.style.backgroundColor = colors[idx];
        const text = document.createElement('span');
        text.textContent = `${label} (${counts[label] || 0})`;
        item.appendChild(checkbox);
        item.appendChild(colorBox);
        item.appendChild(text);
        legendDiv.appendChild(item);
    });
}

function renderYearBar(pubs) {
    const ctx = document.getElementById('yearBarChart');
    const counts = {};
    pubs.forEach(p => { if (p.Year) counts[p.Year] = (counts[p.Year]||0)+1; });
    const years = Object.keys(counts).sort((a,b)=>a-b);
    if (yearChart) yearChart.destroy();
    // Build colors so selected years stand out
    const buildColors = () => years.map(y => activeFilters.years.size === 0 ? '#4e79a7' : (activeFilters.years.has(y) ? '#d9534f' : '#dddddd'));

    yearChart = new Chart(ctx, {
        type: 'bar',
        data: { labels: years, datasets: [{ label: 'Publications', data: years.map(y=>counts[y]), backgroundColor: buildColors() }] },
        options: { responsive: true, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } }
    });

    // Click handler: toggle year filter (single-year selection)
    ctx.onclick = function(evt) {
        const points = yearChart.getElementsAtEventForMode(evt, 'nearest', { intersect: true }, false);
        if (!points.length) return;
        const first = points[0];
        const year = yearChart.data.labels[first.index];
        // Toggle: if not selected, set only that year; if already selected, clear selection
        if (!activeFilters.years.has(year)) {
            activeFilters.years = new Set([year]);
        } else {
            activeFilters.years = new Set();
        }
        renderAll();
    };
}
</script>
</body>
</html>
